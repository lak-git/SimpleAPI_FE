<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/main.css">
    <script src="assets/js/app.js" defer></script>
    <title>Simple Pins Explorer</title>
</head>
<body>
    <header>
        <h1>Simple Pins Explorer</h1>
        <div class="search-bar">
            <input type="text" id="filter-input" placeholder="Search pins by title...">
            <button id="search-btn">Search</button>
            <button id="clear-btn" class="secondary">Clear</button>
        </div>
    </header>

    <main>
        <div id="pins-container" class="grid-container"></div>
    </main>

    <div id="pin-modal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="close-modal-btn">&times;</span>
            <h2 id="modal-title">Loading...</h2>
            <div id="modal-body">Please wait.</div>
        </div>
    </div>
</body>
</html>
